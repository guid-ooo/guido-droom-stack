<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dream Stack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-stone-50 text-slate-900 antialiased">
    <div class="mx-auto max-w-5xl px-6 pt-20">
      <header class="text-center mb-16">
        <a href="/" class="inline-block">
          <div class="flex gap-4 items-center justify-center">
            <img id="hero" alt="" class="rounded-2xl shadow-md aspect-[16/12] object-cover h-14 w-auto" />
            <h1 id="title" class="text-5xl font-semibold tracking-tight"></h1>
          </div>
        </a>
        <p id="subtitle" class="mt-4 text-lg text-slate-600 max-w-xl mx-auto"></p>
      </header>
    </div>

    <main data-barba="wrapper">
      <div data-barba="container" data-barba-namespace="home">
        <section class="mx-auto max-w-5xl px-6 pb-20">
          <h2 id="posts-heading" class="text-2xl font-semibold mb-8"></h2>
          <ul id="posts" class="grid md:grid-cols-3 gap-6"></ul>
        </section>
      </div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
