<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dream Stack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>body { font-family: 'Inter', system-ui, sans-serif; }</style>
  </head>
  <body class="bg-stone-50 text-slate-900 antialiased">
    <main class="mx-auto max-w-5xl px-6 py-20">
      <header class="text-center mb-16">
        <h1 id="title" class="text-5xl font-semibold tracking-tight"></h1>
        <p id="subtitle" class="mt-4 text-lg text-slate-600 max-w-xl mx-auto"></p>
        <img id="hero" alt="" class="mt-10 rounded-2xl shadow-md aspect-[3/2] object-cover w-full" />
      </header>

      <section>
        <h2 id="posts-heading" class="text-2xl font-semibold mb-8"></h2>
        <ul id="posts" class="grid md:grid-cols-3 gap-6"></ul>
      </section>
    </main>

    <script src="assets/js/app.js"></script>
  </body>
</html>
