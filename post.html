<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Post — Dream Stack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-stone-50 text-slate-900 antialiased">
    <div class="mx-auto max-w-5xl px-6 pt-20">
      <header class="text-center mb-16">
        <a href="/" class="inline-block">
          <div class="flex gap-4 items-center justify-center">
            <img id="hero" alt="" class="rounded-2xl shadow-md aspect-[16/12] object-cover h-14 w-auto" />
            <h1 id="title" class="text-5xl font-semibold tracking-tight"></h1>
          </div>
        </a>
        <p id="subtitle" class="mt-4 text-lg text-slate-600 max-w-xl mx-auto"></p>
      </header>
    </div>

    <main data-barba="wrapper">
      <div data-barba="container" data-barba-namespace="post">
        <article class="mx-auto max-w-2xl px-6 pb-20">
          <a href="/" class="text-sm text-slate-500 hover:text-slate-900">← Back</a>
          <h1 id="post-title" class="mt-8 text-4xl font-semibold tracking-tight"></h1>
          <img id="post-image" alt="" class="mt-8 rounded-2xl shadow-md aspect-[3/2] object-cover w-full" />
          <div id="post-body" class="mt-8 space-y-5 text-lg text-slate-700 leading-relaxed"></div>
        </article>
      </div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
